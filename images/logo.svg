<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#2C3E50" />

  <!-- 书本图标 -->
  <g transform="translate(100, 100)">
    <!-- 书本主体 -->
    <path d="M -35 -30 L -35 30 L 35 30 L 35 -30 Z" fill="white" stroke="none"/>

    <!-- 书本页 -->
    <path d="M -35 -30 L -30 -30 L -30 30 L -35 30 Z" fill="#3498DB"/>
    <path d="M -20 -30 L -15 -30 L -15 30 L -20 30 Z" fill="#3498DB"/>
    <path d="M -5 -30 L 0 -30 L 0 30 L -5 30 Z" fill="#3498DB"/>
    <path d="M 10 -30 L 15 -30 L 15 30 L 10 30 Z" fill="#3498DB"/>
    <path d="M 25 -30 L 30 -30 L 30 30 L 25 30 Z" fill="#3498DB"/>

    <!-- 书脊 -->
    <rect x="-40" y="-30" width="5" height="60" fill="#E74C3C"/>

    <!-- 光芒效果 -->
    <path d="M 0 -45 L 0 -60 M -12 -52 L -20 -60 M 12 -52 L 20 -60"
          stroke="#f1c40f" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 文字 -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="20" font-weight="bold" fill="white">学习资源</text>
</svg>