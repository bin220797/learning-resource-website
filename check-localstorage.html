<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查 LocalStorage</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>LocalStorage 数据检查</h1>
    <h2>分类数据</h2>
    <pre id="categories"></pre>
    <h2>管理设置</h2>
    <pre id="settings"></pre>
    <h2>资源数据</h2>
    <pre id="resources"></pre>
    
    <script>
        // 检查分类数据
        const categories = localStorage.getItem('categories');
        document.getElementById('categories').textContent = categories ? categories : '无分类数据';
        
        // 检查管理设置
        const settings = localStorage.getItem('adminSettings');
        document.getElementById('settings').textContent = settings ? settings : '无设置数据';
        
        // 检查资源数据
        const resources = localStorage.getItem('resources');
        document.getElementById('resources').textContent = resources ? resources : '无资源数据';
    </script>
</body>
</html>
